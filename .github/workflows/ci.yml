name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".vscode/**"
      - ".cursor/**"
      - "docs/**"
      - ".gitignore"
      - "README.md"
  pull_request:
    paths-ignore:
      - ".vscode/**"
      - ".cursor/**"
      - "docs/**"
      - ".gitignore"
      - "README.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Smoke test CLI (JSON)
        run: node dist/cli.js skill list --json

      - name: Smoke test CLI (stdout)
        run: |
          output="$(node dist/cli.js skill list)"
          echo "$output"
          if ! echo "$output" | grep -q "example-skill"; then
            echo "Esperado encontrar 'example-skill' na saída do comando skill list."
            exit 1
          fi

      - name: Package dry-run
        run: npm run package:check
